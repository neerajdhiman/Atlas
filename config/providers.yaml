        cost_per_1k_input: 0.00015
        cost_per_1k_output: 0.0006
        supports_tools: true
        supports_streaming: true

  # --- Local Servers (free, auto-discovered from Ollama) ---
  ollama:
    enabled: true
    servers:
      - url: http://10.0.0.9:11434
        name: alpheric
        description: Code generation and general tasks
        # Models: deepseek-coder-v2:16b, deepseek-coder:6.7b, llama3.2, nomic-embed-text
      - url: http://10.0.0.10:11434
        name: alpheric.com
        description: QA, security, reasoning, DevOps
        # Models: codellama:13b, deepseek-r1:8b, mistral:7b
    models: []  # auto-discovered

  # --- OpenClaw Gateway (local network AI gateway) ---
  openclaw:
    enabled: true
    url: http://10.0.0.3:18789
    description: OpenClaw AI gateway — chat history source + model proxy
    models: []  # auto-discovered via gateway

  # --- Atlas Model Family (Alpheric.AI) ---
  # 7 specialized models, each routes through Claude (teacher) + local (student)
  atlas:
    enabled: true
    models:
      - name: atlas-plan
        context_window: 128000
        cost_per_1k_input: 0.0
        cost_per_1k_output: 0.0
        supports_tools: true
        supports_streaming: true
        task_types: [chat, general]
        description: "Planning, discussion, brainstorming"
        local_fallback: llama3.2:latest
      - name: atlas-code
        context_window: 128000
        cost_per_1k_input: 0.0
        cost_per_1k_output: 0.0
        supports_tools: true
        supports_streaming: true
        task_types: [code, structured_extraction]
        description: "Code generation, debugging, review"
        local_fallback: deepseek-coder-v2:16b
      - name: atlas-secure
        context_window: 128000
        cost_per_1k_input: 0.0
        cost_per_1k_output: 0.0
        supports_tools: true
        supports_streaming: true
        task_types: [analysis, math]
        description: "Security analysis, reasoning, auditing"
        local_fallback: deepseek-r1:8b
      - name: atlas-infra
        context_window: 128000
        cost_per_1k_input: 0.0
        cost_per_1k_output: 0.0
        supports_tools: true
        supports_streaming: true
        task_types: [code]
        description: "Infrastructure, DevOps, deployment"
        local_fallback: codellama:13b
      - name: atlas-data
        context_window: 128000
        cost_per_1k_input: 0.0
        cost_per_1k_output: 0.0
        supports_tools: true
        supports_streaming: true
        task_types: [analysis, summarization, math]
        description: "Data analysis, statistics, ETL"
        local_fallback: mistral:7b
      - name: atlas-books
        context_window: 128000
        cost_per_1k_input: 0.0
        cost_per_1k_output: 0.0
        supports_tools: true
        supports_streaming: true
        task_types: [creative, summarization, translation]
        description: "Documentation, writing, research"
        local_fallback: llama3.2:latest
      - name: atlas-audit
        context_window: 128000
        cost_per_1k_input: 0.0
        cost_per_1k_output: 0.0
        supports_tools: true
        supports_streaming: true
        task_types: [structured_extraction, analysis]
        description: "Compliance auditing, log analysis, structured extraction"

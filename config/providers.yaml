providers:
  # --- External Providers (paid, API keys required) ---
  anthropic:
    enabled: true
    models:
      - name: claude-opus-4-20250514
        context_window: 200000
        cost_per_1k_input: 0.015
        cost_per_1k_output: 0.075
        supports_tools: true
        supports_streaming: true
        supports_vision: true
        supports_computer_use: true
        max_output_tokens: 32000
        tier: frontier
        latency_class: normal
      - name: claude-sonnet-4-20250514
        context_window: 200000
        cost_per_1k_input: 0.003
        cost_per_1k_output: 0.015
        supports_tools: true
        supports_streaming: true
        supports_vision: true
        supports_computer_use: true
        max_output_tokens: 16000
        tier: standard
        latency_class: normal
      - name: claude-haiku-4-5-20251001
        context_window: 200000
        cost_per_1k_input: 0.001
        cost_per_1k_output: 0.005
        supports_tools: true
        supports_streaming: true
        supports_vision: true
        max_output_tokens: 8192
        tier: fast
        latency_class: realtime

  openai:
    enabled: true
    models:
      - name: gpt-4o
        context_window: 128000
        cost_per_1k_input: 0.005
        cost_per_1k_output: 0.015
        supports_tools: true
        supports_streaming: true
        supports_vision: true
        max_output_tokens: 16384
        tier: frontier
        latency_class: normal
      - name: gpt-4o-mini
        context_window: 128000
        cost_per_1k_input: 0.00015
        cost_per_1k_output: 0.0006
        supports_tools: true
        supports_streaming: true
        supports_vision: true
        max_output_tokens: 16384
        tier: fast
        latency_class: normal
      - name: o3-mini
        context_window: 200000
        cost_per_1k_input: 0.0011
        cost_per_1k_output: 0.0044
        supports_tools: true
        supports_streaming: true
        max_output_tokens: 65536
        tier: frontier
        latency_class: batch

  # --- Groq (ultra-fast inference, <200ms TTFT) ---
  groq:
    enabled: true
    models:
      - name: llama-3.3-70b-versatile
        context_window: 128000
        cost_per_1k_input: 0.00006
        cost_per_1k_output: 0.00006
        supports_tools: true
        supports_streaming: true
        max_output_tokens: 32768
        tier: standard
        latency_class: realtime
      - name: llama-3.1-8b-instant
        context_window: 128000
        cost_per_1k_input: 0.00005
        cost_per_1k_output: 0.00008
        supports_tools: true
        supports_streaming: true
        max_output_tokens: 8192
        tier: fast
        latency_class: realtime

  vertex:
    enabled: false
    models:
      - name: gemini-2.0-flash
        context_window: 1000000
        cost_per_1k_input: 0.00015
        cost_per_1k_output: 0.0006
        supports_tools: true
        supports_streaming: true
        supports_vision: true
        max_output_tokens: 8192
        tier: fast
        latency_class: normal
      - name: gemini-1.5-pro
        context_window: 2000000
        cost_per_1k_input: 0.00125
        cost_per_1k_output: 0.005
        supports_tools: true
        supports_streaming: true
        supports_vision: true
        max_output_tokens: 8192
        tier: frontier
        latency_class: normal

  # --- Moonshot / Kimi (long-context, cost-efficient) ---
  moonshot:
    enabled: false   # set A1_MOONSHOT_API_KEY to enable
    models:
      - name: moonshot-v1-128k
        context_window: 128000
        cost_per_1k_input: 0.0008
        cost_per_1k_output: 0.0024
        supports_tools: true
        supports_streaming: true
        max_output_tokens: 4096
        tier: standard
        latency_class: normal
      - name: moonshot-v1-32k
        context_window: 32000
        cost_per_1k_input: 0.0004
        cost_per_1k_output: 0.0012
        supports_tools: true
        supports_streaming: true
        max_output_tokens: 4096
        tier: fast
        latency_class: normal
      - name: moonshot-v1-8k
        context_window: 8192
        cost_per_1k_input: 0.0001
        cost_per_1k_output: 0.0003
        supports_tools: true
        supports_streaming: true
        max_output_tokens: 4096
        tier: fast
        latency_class: realtime

  # --- Local Servers (free, auto-discovered from Ollama) ---
  ollama:
    enabled: true
    servers:
      - url: http://10.0.0.9:11434
        name: alpheric
        description: Code generation and general tasks
        # Models: deepseek-coder-v2:16b, deepseek-coder:6.7b, llama3.2, nomic-embed-text
      - url: http://10.0.0.10:11434
        name: alpheric.com
        description: QA, security, reasoning, DevOps, multimodal
        # Models: codellama:13b, deepseek-r1:8b, mistral:7b, gemma4:12b
    models: []  # auto-discovered

  # --- OpenClaw Gateway (local network AI gateway) ---
  openclaw:
    enabled: true
    url: http://10.0.0.3:18789
    description: OpenClaw AI gateway — chat history source + model proxy
    models: []  # auto-discovered via gateway

  # --- Atlas Model Family (Alpheric.AI) ---
  # 7 specialized models, each routes through Claude (teacher) + local (student)
  atlas:
    enabled: true
    models:
      - name: atlas-plan
        context_window: 128000
        cost_per_1k_input: 0.0
        cost_per_1k_output: 0.0
        supports_tools: true
        supports_streaming: true
        task_types: [chat, general, creative]
        description: "Planning, discussion, brainstorming"
        local_fallback: gemma4:12b
        provider_preference: [moonshot, groq, anthropic, claude-cli, openai]
        provider_models:
          moonshot: moonshot-v1-128k
          groq: llama-3.3-70b-versatile
          anthropic: claude-sonnet-4-20250514
          claude-cli: ~
          openai: gpt-4o-mini
        system_prompt_suffix: >
          You excel at strategic planning, collaborative discussion, and structured
          brainstorming. Break complex problems into clear phases. When proposing plans,
          use numbered steps with concise rationale. Prefer actionable outputs over
          abstract frameworks.
      - name: atlas-code
        context_window: 128000
        cost_per_1k_input: 0.0
        cost_per_1k_output: 0.0
        supports_tools: true
        supports_streaming: true
        task_types: [code, structured_extraction]
        description: "Code generation, debugging, review"
        local_fallback: deepseek-coder-v2:16b
        provider_preference: [groq, anthropic, claude-cli, openai]
        provider_models:
          groq: llama-3.3-70b-versatile
          anthropic: claude-sonnet-4-20250514
          claude-cli: ~
          openai: gpt-4o
        system_prompt_suffix: >
          You are an expert software engineer. Apply clean-code principles, SOLID design,
          and language-specific idioms. For debugging: identify root cause before fixing.
          For code review: flag security issues, performance bottlenecks, and maintainability
          concerns. Produce well-commented, production-ready code.
      - name: atlas-secure
        context_window: 128000
        cost_per_1k_input: 0.0
        cost_per_1k_output: 0.0
        supports_tools: true
        supports_streaming: true
        task_types: [analysis, math]
        description: "Security analysis, reasoning, auditing"
        local_fallback: deepseek-r1:8b
        provider_preference: [anthropic, claude-cli, groq, openai]
        provider_models:
          anthropic: claude-opus-4-20250514
          claude-cli: ~
          groq: llama-3.3-70b-versatile
          openai: gpt-4o
        system_prompt_suffix: >
          You are a cybersecurity expert fluent in MITRE ATT&CK, CVSS scoring, OWASP Top 10,
          and threat modeling (STRIDE, PASTA). Map findings to ATT&CK tactics and techniques
          where applicable. Prioritize by exploitability and business impact. Recommend
          mitigations aligned with NIST CSF and CIS Controls.
      - name: atlas-infra
        context_window: 128000
        cost_per_1k_input: 0.0
        cost_per_1k_output: 0.0
        supports_tools: true
        supports_streaming: true
        task_types: [infra, code]
        description: "Infrastructure, DevOps, deployment"
        local_fallback: codellama:13b
        provider_preference: [anthropic, claude-cli, groq, openai]
        provider_models:
          anthropic: claude-sonnet-4-20250514
          claude-cli: ~
          groq: llama-3.3-70b-versatile
          openai: gpt-4o
        system_prompt_suffix: >
          You are a senior DevOps and platform engineer. Apply infrastructure-as-code best
          practices for Terraform, Kubernetes, Docker, and CI/CD pipelines. Prioritize
          idempotency, observability, and least-privilege IAM. Flag single points of failure
          and suggest high-availability patterns. Prefer declarative over imperative config.
      - name: atlas-data
        context_window: 128000
        cost_per_1k_input: 0.0
        cost_per_1k_output: 0.0
        supports_tools: true
        supports_streaming: true
        task_types: [analysis, summarization, math]
        description: "Data analysis, statistics, ETL"
        local_fallback: gemma4:12b
        provider_preference: [openai, moonshot, groq, anthropic, claude-cli]
        provider_models:
          openai: gpt-4o
          moonshot: moonshot-v1-128k
          groq: llama-3.3-70b-versatile
          anthropic: claude-sonnet-4-20250514
          claude-cli: ~
        system_prompt_suffix: >
          You are a data scientist and analytics engineer. Apply statistical rigor: state
          assumptions, validate distributions, and flag confounding variables. For ETL tasks,
          emphasize data quality checks, schema evolution, and idempotent pipelines. Present
          findings with appropriate uncertainty bounds and visualisation suggestions.
      - name: atlas-books
        context_window: 128000
        cost_per_1k_input: 0.0
        cost_per_1k_output: 0.0
        supports_tools: true
        supports_streaming: true
        task_types: [creative, summarization, translation]
        description: "Documentation, writing, research"
        local_fallback: gemma4:12b
        provider_preference: [moonshot, openai, groq, anthropic, claude-cli]
        provider_models:
          moonshot: moonshot-v1-128k
          openai: gpt-4o-mini
          groq: llama-3.3-70b-versatile
          anthropic: claude-sonnet-4-20250514
          claude-cli: ~
        system_prompt_suffix: >
          You are an expert technical writer and researcher. Produce clear, audience-aware
          prose — adjust tone and vocabulary to the reader's expertise level. For documentation:
          follow docs-as-code conventions (Diátaxis framework: tutorials, how-tos, reference,
          explanation). For summaries: preserve key claims, caveats, and source attribution.
      - name: atlas-audit
        context_window: 128000
        cost_per_1k_input: 0.0
        cost_per_1k_output: 0.0
        supports_tools: true
        supports_streaming: true
        task_types: [structured_extraction, analysis]
        description: "Compliance auditing, log analysis, structured extraction"
        local_fallback: deepseek-coder:6.7b
        provider_preference: [openai, anthropic, claude-cli, groq]
        provider_models:
          openai: gpt-4o
          anthropic: claude-opus-4-20250514
          claude-cli: ~
          groq: llama-3.3-70b-versatile
        system_prompt_suffix: >
          You are a compliance and audit specialist. Apply regulatory frameworks including
          SOC 2, ISO 27001, GDPR, HIPAA, and PCI-DSS. For log analysis: extract anomalies,
          correlate events by timestamp and entity, and flag policy violations. For structured
          extraction: output valid JSON or structured tables matching the requested schema.
          Always cite the specific control or clause driving a finding.

# A1 Trainer Routing Policy
# Routes tasks to the best model based on type
# Local models (free) are preferred when quality is sufficient

default_strategy: best_quality

# Task type -> preferred model + fallback chain
# Order: try local first (free), then external (paid)
task_defaults:
  code:
    model: deepseek-coder-v2:16b         # Server 1 (local, free, best for code)
    fallback:
      - deepseek-coder:6.7b              # Server 1 (local, lighter fallback)
      - codellama:13b                     # Server 2 (local, code review)
      - claude-sonnet-4-20250514          # External (paid, highest quality)
      - gpt-4o                            # External (paid)

  infra:
    model: deepseek-r1:8b                # Server 2 (local, reasoning — IaC is declarative config generation)
    fallback:
      - mistral:7b                        # Server 2 (local)
      - claude-sonnet-4-20250514          # External (paid, strong reasoning)

  chat:
    model: llama3.2:latest                # Server 1 (local, fast for chat)
    fallback:
      - mistral:7b                        # Server 2 (local)
      - gpt-4o-mini                       # External (cheap)
      - claude-haiku-4-5-20251001         # External (cheap)

  analysis:
    model: deepseek-r1:8b                 # Server 2 (local, reasoning)
    fallback:
      - deepseek-coder-v2:16b            # Server 1 (local)
      - claude-sonnet-4-20250514          # External (best for analysis)
      - gpt-4o                            # External

  creative:
    model: mistral:7b                     # Server 2 (local)
    fallback:
      - llama3.2:latest                   # Server 1 (local)
      - claude-sonnet-4-20250514          # External

  summarization:
    model: llama3.2:latest                # Server 1 (local, fast)
    fallback:
      - mistral:7b                        # Server 2 (local)
      - gpt-4o-mini                       # External (cheap)

  translation:
    model: mistral:7b                     # Server 2 (local, multilingual)
    fallback:
      - llama3.2:latest                   # Server 1 (local)
      - gpt-4o                            # External

  math:
    model: deepseek-r1:8b                 # Server 2 (local, reasoning)
    fallback:
      - deepseek-coder-v2:16b            # Server 1 (local)
      - o3-mini                           # External (strong math)
      - claude-sonnet-4-20250514          # External

  structured_extraction:
    model: deepseek-coder:6.7b            # Server 1 (local, structured output)
    fallback:
      - mistral:7b                        # Server 2 (local)
      - gpt-4o                            # External

  general:
    model: llama3.2:latest                # Server 1 (local, FAST — 2-3s response)
    fallback:
      - mistral:7b                        # Server 2 (local, ~5s)
      - deepseek-coder:6.7b              # Server 1 (local, faster than v2:16b)
      - gpt-4o-mini                       # External (cheap)

# Exploration rate: 10% of requests try non-optimal models for data collection
exploration_rate: 0.1

# Always try local Ollama as last resort
global_fallback: local

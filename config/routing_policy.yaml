# A1 Trainer Routing Policy
# Routes tasks to the best model based on type
# Local models (free) are preferred when quality is sufficient

default_strategy: best_quality

# Task type -> preferred model + fallback chain
# Servers:
#   10.0.0.9  — code specialists: deepseek-coder-v2:16b, deepseek-coder:6.7b, llama3.2:latest, nomic-embed-text
#   10.0.0.10 — reasoning & general: gemma4:12b, deepseek-r1:8b, mistral:7b, codellama:13b

task_defaults:
  code:
    model: deepseek-coder-v2:16b            # S1 — best local code model
    fallback:
      - deepseek-coder:6.7b                 # S1 — lighter code fallback
      - gemma4:12b                           # S2 — strong general coding (128K ctx)
      - codellama:13b                        # S2 — code review
      - claude-sonnet-4-20250514            # External
      - gpt-4o                              # External

  infra:
    model: deepseek-r1:8b                   # S2 — reasoning for IaC/config generation
    fallback:
      - gemma4:12b                           # S2 — strong reasoning, multimodal (screen/UI)
      - codellama:13b                        # S2 — code-aware fallback
      - claude-sonnet-4-20250514            # External

  chat:
    model: gemma4:12b                        # S2 — best local chat quality (128K ctx, vision)
    fallback:
      - llama3.2:latest                      # S1 — fast fallback
      - gpt-4o-mini                          # External (cheap)
      - claude-haiku-4-5-20251001           # External (cheap)

  analysis:
    model: deepseek-r1:8b                   # S2 — specialized reasoning
    fallback:
      - gemma4:12b                           # S2 — broad analytical capability
      - deepseek-coder-v2:16b              # S1 — structured thinking
      - claude-sonnet-4-20250514            # External
      - gpt-4o                              # External

  creative:
    model: gemma4:12b                        # S2 — best local creative/writing quality
    fallback:
      - llama3.2:latest                      # S1 — fast fallback
      - claude-sonnet-4-20250514            # External

  summarization:
    model: gemma4:12b                        # S2 — strong compression + multilingual
    fallback:
      - llama3.2:latest                      # S1 — fast fallback
      - gpt-4o-mini                          # External (cheap)

  translation:
    model: gemma4:12b                        # S2 — multilingual, trained on 140+ languages
    fallback:
      - mistral:7b                           # S2 — multilingual fallback
      - llama3.2:latest                      # S1 — quick fallback
      - gpt-4o                              # External (best translation)

  math:
    model: deepseek-r1:8b                   # S2 — specialized math reasoning
    fallback:
      - gemma4:12b                           # S2 — AIME 2026: 89.2%
      - deepseek-coder-v2:16b              # S1
      - o3-mini                             # External (strong math)
      - claude-sonnet-4-20250514            # External

  structured_extraction:
    model: deepseek-r1:8b                   # S2 — reasoning + structured output
    fallback:
      - gemma4:12b                           # S2 — vision helps with doc/PDF parsing
      - deepseek-coder:6.7b                # S1
      - gpt-4o                              # External

  general:
    model: llama3.2:latest                  # S1 — fastest for simple general tasks
    fallback:
      - gemma4:12b                           # S2 — high quality when speed less critical
      - deepseek-coder:6.7b               # S1
      - gpt-4o-mini                          # External (cheap)

# Exploration rate: 10% of requests try non-optimal models for data collection
exploration_rate: 0.1

# Always try local Ollama as last resort
global_fallback: local

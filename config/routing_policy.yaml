# Default routing policy (used before ML classifier has enough data)
default_strategy: best_quality

# Task type -> preferred model (cold start defaults)
task_defaults:
  code:
    model: claude-sonnet-4-20250514
    fallback: [gpt-4o, o3-mini]
  chat:
    model: gpt-4o-mini
    fallback: [claude-haiku-4-5-20251001]
  analysis:
    model: claude-sonnet-4-20250514
    fallback: [gpt-4o]
  creative:
    model: claude-sonnet-4-20250514
    fallback: [gpt-4o]
  summarization:
    model: gpt-4o-mini
    fallback: [claude-haiku-4-5-20251001]
  translation:
    model: gpt-4o
    fallback: [claude-sonnet-4-20250514]
  math:
    model: o3-mini
    fallback: [claude-sonnet-4-20250514, gpt-4o]
  structured_extraction:
    model: gpt-4o
    fallback: [claude-sonnet-4-20250514]
  general:
    model: gpt-4o-mini
    fallback: [claude-haiku-4-5-20251001]

# Exploration rate for epsilon-greedy
exploration_rate: 0.1

# Fallback: always try local Ollama as last resort
global_fallback: local

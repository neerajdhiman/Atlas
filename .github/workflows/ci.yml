name: Atlas CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: |
          export A1_DATABASE_URL=sqlite+aiosqlite:///./test.db
          python -m pytest tests/ -v --tb=short --cov=src/a1 --cov-report=term-missing --cov-fail-under=15
        env:
          A1_DATABASE_URL: "sqlite+aiosqlite:///./test.db"

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t atlas:ci .
